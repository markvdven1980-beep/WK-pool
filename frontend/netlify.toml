# Netlify-configuratie voor de WK Poule 2026 frontend.
# Stel in de Netlify UI de environment variable VITE_API_URL in
# naar de URL van je backend (bijv. https://wk-poule-backend.onrender.com).

[build]
  command = "npm run build"
  publish = "dist"

# Single Page App: stuur alle routes naar index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
